<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Research Project</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <div class="top-bar"></div>
      <h1 id="header">JoshGPT</h1>
      <hr>
      <form id="ai-form">
        <div class="container">
          <div id="answer">
            <label for="fileInput" class="button"><img src="images/add_file.png" alt="icon"></label>
            <input type="file" id="fileInput" style="display: none;" accept=".pptx, .docx, 
               application/vnd.openxmlformats-officedocument.presentationml.presentation, 
               application/vnd.openxmlformats-officedocument.wordprocessingml.document">
            <div id="fileStatus"></div>
            <textarea id="userInput" name="userInput" rows="5" cols="50" placeholder="Enter question:"></textarea>
          </div>
        </div>
        <br/>
        <div class="text-box">
          <div id="response" class="wrapped-text"></div>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xmldom@0.8.10/xmldom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
      const form = document.getElementById("ai-form");
      const textarea = document.getElementById("userInput");
      const responseBox = document.getElementById("response");
      let extraInfo = "";
      let prevMemory = "Context:";

      textarea.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event("submit"));
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const userInput = textarea.value.trim();
        if (!userInput) return;

        responseBox.innerHTML = "Loading...";
        const response = await fetch("https://groq-proxy.joshbos119.workers.dev", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({userInput: `[BACKGROUND MEMORY: ${prevMemory}]\n\n[CURRENT USER QUESTION: ${userInput}]`, extraInfo}),
        });

        const data = await response.json();
        let groqAnswer = data.choices[0].message.content
        responseBox.innerHTML = marked.parse(groqAnswer);

        let summaryPrompt = `Write a 1-sentence summary of this exchange in the third person (e.g., 'The user asked about X and the AI explained Y'). Only return the sentence, nothing else. Question: ${userInput}, Answer: ${groqAnswer}`;
        const summary = await fetch("https://groq-proxy.joshbos119.workers.dev", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({userInput: summaryPrompt}),
        });

        const summaryData = await summary.json();
        console.log(summaryData);
        const newSummaryChunk = summaryData.choices[0].message.content;

        prevMemory += " " + newSummaryChunk
        textarea.value = "";
        fileStatus.textContent = "";
        extraInfo = "";
      });

      document.getElementById('fileInput').addEventListener('change', async (event) => {
        const file = event.target.files[0];
        const fileStatus = document.getElementById('fileStatus');
        
        if (!file) {
          fileStatus.textContent = "";
          extraInfo = "";
          return;
        }

        fileStatus.textContent = `File attached: ${file.name}`;
        
        if (file.name.endsWith(".pptx")) {
          const arrayBuffer = await file.arrayBuffer();
          const text = await getTextFromPPTX(arrayBuffer);
          extraInfo = text;
        }

        if (file.name.endsWith(".docx")) {
          const arrayBuffer = await file.arrayBuffer();
          const text = await getTextFromDOCX(arrayBuffer);
          extraInfo = text;
        }
      });

      async function getTextFromPPTX(arrayBuffer) {
        const zip = await JSZip.loadAsync(arrayBuffer);
        const aNamespace = "http://schemas.openxmlformats.org/drawingml/2006/main";
        let text = '';
        let slideIndex = 1;
        while (true) {
          const slideFile = zip.file(`ppt/slides/slide${slideIndex}.xml`);
          if (!slideFile) break;
          const slideXmlStr = await slideFile.async('text');
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(slideXmlStr, 'application/xml');
          text += getTextFromNodes(xmlDoc, "t", aNamespace) + ' ';
          slideIndex++;
        }
        return text.trim();
      }

      async function getTextFromDOCX(arrayBuffer) {
        try {
          const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
          
          return result.value; 
        } catch (error) {
          console.error("Error parsing DOCX:", error);
          return "";
        }
      }

      function getTextFromNodes(node, tagName, namespaceURI) {
        let text = "";
        const textNodes = node.getElementsByTagNameNS(namespaceURI, tagName);
        for (let i = 0; i < textNodes.length; i++) {
          text += textNodes[i].textContent + " ";
        }
        return text.trim();
      }
    </script>
  </body>
</html>
